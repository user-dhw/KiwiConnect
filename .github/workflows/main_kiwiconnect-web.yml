# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - kiwiconnect-web

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read #This is required for actions/checkout

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js version
              uses: actions/setup-node@v4
              with:
                  node-version: '22.x'

            - name: npm install, build, and test
              working-directory: web
              env:
                  VITE_API_URL: https://kiwiconnect-api-bdh4f0gsa6dhhkam.australiaeast-01.azurewebsites.net
              run: |
                  npm install
                  npm run build --if-present
                  npm run test --if-present

            - name: Upload artifact for deployment job
              uses: actions/upload-artifact@v4
              with:
                  name: node-app
                  path: web/dist

    deploy:
        runs-on: ubuntu-latest
        needs: build
        permissions:
            id-token: write #This is required for requesting the JWT
            contents: read #This is required for actions/checkout

        steps:
            - name: Download artifact from build job
              uses: actions/download-artifact@v4
              with:
                  name: node-app
                  path: dist

            - name: Login to Azure
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_14FC65EDDD0F47B4A95A4BBE70411D66 }}
                  tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7B454D2037924C72B285656D168180BC }}
                  subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BC842DF8CCBA421B979D9E2C55AAF023 }}

            - name: Deploy to Azure Web App
              id: deploy-to-webapp
              uses: azure/webapps-deploy@v3
              with:
                  app-name: kiwiconnect-web
                  slot-name: Production
                  package: dist
